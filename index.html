<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="theme-color" content="#1a56db" />
        <meta
            name="description"
            content="上海海事大学常用资源站点入口，支持 PWA 安装。"
        />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <meta name="apple-mobile-web-app-title" content="海大资源站" />
        <link rel="manifest" href="./manifest.webmanifest" />
        <link rel="icon" href="./icons/avatar.jpg" type="image/jpeg" />
        <link rel="apple-touch-icon" href="./icons/avatar.jpg" />
        <link rel="stylesheet" href="./styles.css" />
        <title>海大资源站</title>
    </head>
    <body>
        <div class="app">
            <header class="app-bar">
                <div class="app-bar-inner">
                    <h1>海大资源站</h1>
                    <form id="searchForm" class="top-search" autocomplete="off">
                        <label for="searchInput" class="sr-only"
                            >搜索资源</label
                        >
                        <span class="search-icon" aria-hidden="true">🔎</span>
                        <input
                            id="searchInput"
                            type="search"
                            placeholder="搜索资源"
                        />
                    </form>
                    <div class="top-actions">
                        <a
                            class="github-link"
                            href="https://github.com/SMU-RES"
                            target="_blank"
                            rel="noopener noreferrer"
                            aria-label="GitHub"
                            ><svg
                                class="github-icon"
                                viewBox="0 0 16 16"
                                aria-hidden="true"
                            >
                                <path
                                    fill="currentColor"
                                    d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.5 7.5 0 0 1 8 3.8c.68 0 1.36.09 2 .26 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"
                                />
                            </svg>
                            <span>GitHub</span></a
                        >
                        <button id="installBtn" class="install-btn" hidden>
                            安装应用
                        </button>
                    </div>
                </div>
            </header>

            <main class="main-content">
                <section class="resource-section">
                    <div class="section-head">
                        <h2>已收录资源</h2>
                        <p id="resultCount"></p>
                    </div>
                    <div id="resourceGrid" class="resource-grid"></div>
                </section>
            </main>

            <footer class="app-footer">
                <p>
                    海大资源站 · GPLv3 ·
                    仅聚合公开入口，具体服务以学校官方页面为准。
                </p>
            </footer>
        </div>

        <template id="resourceCardTemplate">
            <article class="resource-card">
                <h3 class="resource-title"></h3>
                <p class="resource-desc"></p>
                <div class="resource-note"></div>
                <div class="resource-actions">
                    <a
                        class="site-btn static-btn"
                        target="_blank"
                        rel="noopener noreferrer"
                        >前往静态站（推荐）</a
                    >
                    <a
                        class="site-btn dynamic-btn"
                        target="_blank"
                        rel="noopener noreferrer"
                        >前往动态站</a
                    >
                </div>
            </article>
        </template>

        <script src="./app.js" defer></script>
    </body>
</html>
