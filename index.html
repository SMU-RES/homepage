<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="theme-color" content="#1a56db" />
        <meta
            name="description"
            content="上海海事大学常用资源站点入口，支持 PWA 安装。"
        />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <meta name="apple-mobile-web-app-title" content="资源站" />
        <link rel="manifest" href="./manifest.webmanifest" />
        <link rel="icon" href="./icons/avatar.jpg" type="image/jpeg" />
        <link rel="apple-touch-icon" href="./icons/avatar.jpg" />
        <link rel="stylesheet" href="./styles.css" />
        <title>资源站</title>
    </head>
    <body>
        <div class="app">
            <header class="app-bar">
                <div class="app-bar-inner">
                    <h1>资源站</h1>
                    <form id="searchForm" class="top-search" autocomplete="off">
                        <label for="searchInput" class="sr-only"
                            >搜索资源</label
                        >
                        <span class="search-icon" aria-hidden="true">🔎</span>
                        <input
                            id="searchInput"
                            type="search"
                            placeholder="搜索资源（如 选课通 / 动态站 / 静态站）"
                        />
                    </form>
                    <button id="installBtn" class="install-btn" hidden>
                        安装应用
                    </button>
                </div>
            </header>

            <main class="main-content">
                <section class="resource-section">
                    <div class="section-head">
                        <h2>已收录资源</h2>
                        <p id="resultCount"></p>
                    </div>
                    <div id="resourceGrid" class="resource-grid"></div>
                </section>
            </main>

            <footer class="app-footer">
                <p>
                    资源站 · GPLv3 ·
                    仅聚合公开入口，具体服务以学校官方页面为准。
                </p>
            </footer>
        </div>

        <template id="resourceCardTemplate">
            <article class="resource-card">
                <h3 class="resource-title"></h3>
                <p class="resource-desc"></p>
                <div class="resource-note"></div>
                <div class="resource-actions">
                    <a
                        class="site-btn dynamic-btn"
                        target="_blank"
                        rel="noopener noreferrer"
                        >前往动态站</a
                    >
                    <a
                        class="site-btn static-btn"
                        target="_blank"
                        rel="noopener noreferrer"
                        >前往静态站</a
                    >
                </div>
            </article>
        </template>

        <script src="./app.js" defer></script>
    </body>
</html>
